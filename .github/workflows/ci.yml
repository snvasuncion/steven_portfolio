name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Build web
        run: flutter build web --release --dart-define=ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
